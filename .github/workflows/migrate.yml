# ─────────────────────────────────────────────────────────────
# EVIDETH — migrate.yml
# PostgreSQL es VNet-only (sin acceso público).
# Las migraciones se ejecutan mediante un Container App Job efímero
# dentro del mismo managed environment (misma VNet que el backend).
# ─────────────────────────────────────────────────────────────
name: DB Migrate

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: evideth-dev-rg
  CAE_NAME:       evideth-dev-cae
  BACKEND_APP:    evideth-dev-backend
  JOB_NAME:       evideth-migrate-job

jobs:
  migrate:
    name: Alembic Upgrade Head (via Container App Job)
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp CLI extension
        run: az extension add --name containerapp --upgrade -y

      # Obtener imagen actual del backend
      - name: Get current backend image
        id: image
        run: |
          IMAGE=$(az containerapp show \
            --name           ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "properties.template.containers[0].image" \
            --output         tsv)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "📦 Image: $IMAGE"

      # Construir DATABASE_URL directamente desde los componentes de Azure
      # El job necesita conectarse al PostgreSQL privado — usa el FQDN interno
      - name: Build DATABASE_URL
        id: dburl
        run: |
          KV=$(az keyvault list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].name" --output tsv)

          FQDN=$(az postgres flexible-server show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name evideth-dev-pgserver \
            --query "fullyQualifiedDomainName" --output tsv)

          DB_PASS=$(az keyvault secret show \
            --vault-name "$KV" --name "db-password" \
            --query "value" --output tsv)

          # El admin user lo lee del Container App (var DB_USER o db-user secret)
          DB_USER=$(az containerapp show \
            --name           ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "properties.template.containers[0].env[?name=='DB_USER'].value | [0]" \
            --output         tsv)

          # Fallback: user estándar de Azure PostgreSQL (admin@server)
          if [ -z "$DB_USER" ] || [ "$DB_USER" = "None" ]; then
            DB_USER="evidethadmin"
          fi

          DB_URL="postgresql://${DB_USER}:${DB_PASS}@${FQDN}:5432/evideth_db?sslmode=require"
          # Enmascarar en logs
          echo "::add-mask::$DB_PASS"
          echo "::add-mask::$DB_URL"
          echo "database_url=$DB_URL" >> $GITHUB_OUTPUT
          echo "✅ DATABASE_URL built (host: $FQDN)"

      # Limpiar job anterior si existiera
      - name: Delete previous migration job if exists
        run: |
          az containerapp job delete \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null && echo "🗑️ Old job deleted" || echo "✅ No previous job"

      # Crear job efímero con DATABASE_URL como env var directa
      - name: Create migration Container App Job
        run: |
          az containerapp job create \
            --name                     ${{ env.JOB_NAME }} \
            --resource-group           ${{ env.RESOURCE_GROUP }} \
            --environment              ${{ env.CAE_NAME }} \
            --trigger-type             Manual \
            --replica-timeout          300 \
            --replica-retry-limit      1 \
            --replica-completion-count 1 \
            --parallelism              1 \
            --image                    "${{ steps.image.outputs.image }}" \
            --cpu                      0.5 \
            --memory                   1Gi \
            --registry-server          evidethdevacr94f04b.azurecr.io \
            --registry-identity        system \
            --env-vars                 "DATABASE_URL=${{ steps.dburl.outputs.database_url }}"
          echo "✅ Job created"

      # Arrancar el job y capturar el execution name
      - name: Start migration job
        id: execution
        run: |
          EXEC=$(az containerapp job start \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "name" \
            --output         tsv)
          echo "name=$EXEC" >> $GITHUB_OUTPUT
          echo "⏳ Execution: $EXEC"

      # Polling hasta Succeeded / Failed (timeout 5 min)
      - name: Wait for migration to complete
        run: |
          for i in $(seq 1 30); do
            STATUS=$(az containerapp job execution show \
              --name                 ${{ env.JOB_NAME }} \
              --resource-group       ${{ env.RESOURCE_GROUP }} \
              --job-execution-name   "${{ steps.execution.outputs.name }}" \
              --query                "properties.status" \
              --output               tsv 2>/dev/null || echo "Running")
            echo "  [$i/30] $STATUS"
            if   [ "$STATUS" = "Succeeded" ]; then echo "✅ Migrations applied!"; exit 0
            elif [ "$STATUS" = "Failed"    ]; then echo "❌ Migration failed!";    exit 1
            fi
            sleep 10
          done
          echo "❌ Timeout"; exit 1

      # Cleanup siempre
      - name: Cleanup migration job
        if: always()
        run: |
          az containerapp job delete \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || true
          echo "🧹 Job deleted"
