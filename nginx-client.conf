# EVIDETH — Nginx config para el cliente de cámara (puerto 8080)
# Sirve el frontend estático y redirige /viewer a la página correcta

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Ruta raíz → redirige directamente al Live Viewer
    location = / {
        return 301 /pages/viewer/viewer.html;
    }

    # Servir todos los ficheros estáticos
    location / {
        try_files $uri $uri/ =404;
    }

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logs
    access_log /var/log/nginx/client-access.log;
    error_log  /var/log/nginx/client-error.log;
}
