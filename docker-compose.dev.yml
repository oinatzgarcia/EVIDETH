# EVIDETH — Docker Compose DESARROLLO LOCAL
# ==============================================
# Entorno completo para desarrollo:
#   - PostgreSQL 15
#   - Backend FastAPI + Frontend estático
#
# Uso:
#   1. Copiar .env.example → .env (raíz del proyecto)
#   2. docker-compose -f docker-compose.dev.yml up -d
#   3. Acceder a http://localhost:8000
#
# Para crear el admin:
#   docker exec evideth-backend python scripts/seed_admin.py
# ==============================================

services:
  postgres:
    image: postgres:15-alpine
    container_name: evideth-postgres
    environment:
      POSTGRES_USER: evideth_user
      POSTGRES_PASSWORD: evideth_pass
      POSTGRES_DB: evideth_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evideth_user -d evideth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evideth-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://evideth_user:evideth_pass@postgres:5432/evideth_db
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./frontend:/app/frontend
      - ./alembic:/app/alembic
      - backend-logs:/app/logs
      - backend-temp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
      echo '⏳ Esperando PostgreSQL...' &&
      sleep 5 &&
      echo '🔄 Aplicando migraciones Alembic...' &&
      alembic upgrade head &&
      echo '🚀 Arrancando servidor FastAPI...' &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  client:
    image: nginx:alpine
    container_name: evideth-client
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx-client.conf:/etc/nginx/conf.d/default.conf:rw
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres-data:
  backend-logs:
  backend-temp:
