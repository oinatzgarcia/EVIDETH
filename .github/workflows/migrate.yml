name: DB Migrate

on:
  workflow_dispatch:
  workflow_call:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: evideth-dev-rg
  CAE_NAME:       evideth-dev-cae
  BACKEND_APP:    evideth-dev-backend
  ACR_NAME:       evidethdevacr94f04b
  JOB_NAME:       evideth-migrate-job
  PG_SERVER:      evideth-dev-pgserver

jobs:
  migrate:
    name: Alembic Upgrade Head (via Container App Job)
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install containerapp CLI extension
        run: az extension add --name containerapp --upgrade -y

      - name: Get current backend image
        id: image
        run: |
          IMAGE=$(az containerapp show \
            --name           ${{ env.BACKEND_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "properties.template.containers[0].image" \
            --output         tsv)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "Image: $IMAGE"

      - name: Get ACR credentials
        id: acr
        run: |
          ACR_USER=$(az acr credential show \
            --name           ${{ env.ACR_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "username" --output tsv)
          ACR_PASS=$(az acr credential show \
            --name           ${{ env.ACR_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "passwords[0].value" --output tsv)
          echo "::add-mask::$ACR_PASS"
          echo "username=$ACR_USER" >> $GITHUB_OUTPUT
          echo "password=$ACR_PASS" >> $GITHUB_OUTPUT

      # Lee del Key Vault: db-password y jwt-secret-key
      # Construye DATABASE_URL y extrae JWT_SECRET para inyectarlos todos
      - name: Build env vars from Key Vault
        id: secrets
        run: |
          KV=$(az keyvault list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "[0].name" --output tsv)
          echo "Key Vault: $KV"

          FQDN=$(az postgres flexible-server show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name           ${{ env.PG_SERVER }} \
            --query          "fullyQualifiedDomainName" --output tsv)

          DB_PASS=$(az keyvault secret show \
            --vault-name "$KV" --name "db-password" \
            --query "value" --output tsv)

          JWT_SECRET=$(az keyvault secret show \
            --vault-name "$KV" --name "jwt-secret-key" \
            --query "value" --output tsv)

          DB_URL="postgresql://evidethadmin:${DB_PASS}@${FQDN}:5432/evideth_db?sslmode=require"

          echo "::add-mask::$DB_PASS"
          echo "::add-mask::$JWT_SECRET"
          echo "::add-mask::$DB_URL"

          echo "database_url=$DB_URL"   >> $GITHUB_OUTPUT
          echo "jwt_secret=$JWT_SECRET" >> $GITHUB_OUTPUT
          echo "DB host: $FQDN"

      - name: Delete previous migration job if exists
        run: |
          az containerapp job delete \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null && echo "Old job deleted" || echo "No previous job"

      # Se inyectan TODAS las variables required de app/config.py:
      #   DATABASE_URL, SECRET_KEY, JWT_SECRET_KEY
      # El comando se pasa como lista separada por espacios (no comas)
      # para que la CLI lo parsee correctamente.
      - name: Create migration Container App Job
        run: |
          az containerapp job create \
            --name                     ${{ env.JOB_NAME }} \
            --resource-group           ${{ env.RESOURCE_GROUP }} \
            --environment              ${{ env.CAE_NAME }} \
            --trigger-type             Manual \
            --replica-timeout          300 \
            --replica-retry-limit      1 \
            --replica-completion-count 1 \
            --parallelism              1 \
            --image                    "${{ steps.image.outputs.image }}" \
            --cpu                      0.5 \
            --memory                   1Gi \
            --registry-server          ${{ env.ACR_NAME }}.azurecr.io \
            --registry-username        "${{ steps.acr.outputs.username }}" \
            --registry-password        "${{ steps.acr.outputs.password }}" \
            --env-vars \
              "DATABASE_URL=${{ steps.secrets.outputs.database_url }}" \
              "SECRET_KEY=${{ steps.secrets.outputs.jwt_secret }}" \
              "JWT_SECRET_KEY=${{ steps.secrets.outputs.jwt_secret }}" \
              "APP_ENV=migration" \
            --command "alembic" \
            --args    "upgrade" "head"
          echo "Job created (cmd: alembic upgrade head)"

      - name: Start migration job
        id: execution
        run: |
          EXEC=$(az containerapp job start \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "name" --output tsv)
          echo "name=$EXEC" >> $GITHUB_OUTPUT
          echo "Execution: $EXEC"

      - name: Wait for migration to complete
        id: wait
        run: |
          FINAL_STATUS="Unknown"
          for i in $(seq 1 36); do
            STATUS=$(az containerapp job execution show \
              --name               ${{ env.JOB_NAME }} \
              --resource-group     ${{ env.RESOURCE_GROUP }} \
              --job-execution-name "${{ steps.execution.outputs.name }}" \
              --query              "properties.status" \
              --output             tsv 2>/dev/null || echo "Running")
            echo "[$i/36] $STATUS"
            FINAL_STATUS="$STATUS"
            if [ "$STATUS" = "Succeeded" ] || [ "$STATUS" = "Failed" ]; then break; fi
            sleep 10
          done
          echo "status=$FINAL_STATUS" >> $GITHUB_OUTPUT

      - name: Fetch logs from Log Analytics
        if: always()
        run: |
          echo "Waiting 60s for Log Analytics ingestion..."
          sleep 60
          WORKSPACE=$(az monitor log-analytics workspace list \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "[0].customerId" --output tsv 2>/dev/null || echo "")
          if [ -n "$WORKSPACE" ]; then
            az monitor log-analytics query \
              --workspace "$WORKSPACE" \
              --analytics-query "ContainerAppConsoleLogs_CL | where ContainerName_s has 'migrate' or ContainerJobName_s has 'migrate' | order by TimeGenerated asc | project TimeGenerated, Log_s" \
              --output table 2>/dev/null || true
          fi

      - name: Fail if migration failed
        if: steps.wait.outputs.status != 'Succeeded'
        run: |
          echo "Migration status: ${{ steps.wait.outputs.status }}"
          exit 1

      - name: Cleanup migration job
        if: always()
        run: |
          az containerapp job delete \
            --name           ${{ env.JOB_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --yes 2>/dev/null || true
