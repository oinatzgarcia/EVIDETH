# EVIDETH — Nginx config para el cliente de cámara (puerto 8080)
# Sirve el frontend estático y redirige /viewer a la página correcta

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Ruta raíz → sirve el viewer directamente (sin redirect, evita pérdida de puerto)
    location = / {
        rewrite ^ /pages/viewer/viewer.html last;
    }

    # Servir todos los ficheros estáticos
    location / {
        try_files $uri $uri/ =404;
    }

    # Headers de seguridad básicos
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logs
    access_log /var/log/nginx/client-access.log;
    error_log  /var/log/nginx/client-error.log;
}
