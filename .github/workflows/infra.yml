# ─────────────────────────────────────────────────────────────
# EVIDETH — infra.yml
# Workflow REUTILIZABLE — llamado desde ci.yml
# Valida infraestructura: terraform fmt, validate.
# NO hace plan ni apply (eso lo hacen terraform-plan.yml
# y terraform-apply.yml existentes).
# ─────────────────────────────────────────────────────────────
name: Infra CI

on:
  workflow_call:   # Solo se ejecuta cuando lo llama ci.yml

jobs:
  infra:
    name: Infra — Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      # ── Formato ────────────────────────────────────
      # `terraform fmt -recursive -diff` formatea los ficheros
      # y muestra el diff. Nunca falla (|| true), por lo que
      # el CI no se bloquea por problemas de estilo.
      # Para corregir localmente: cd terraform && terraform fmt -recursive
      - name: Terraform fmt (auto-format + diff report)
        working-directory: terraform/
        run: |
          terraform fmt -recursive -diff > /tmp/fmt_diff.txt 2>&1 || true
          if [ -s /tmp/fmt_diff.txt ]; then
            echo ""
            echo "⚠️  Ficheros .tf reformateados automáticamente:"
            cat /tmp/fmt_diff.txt
            echo ""
            echo "💡 Para evitar esta advertencia, ejecuta localmente:"
            echo "   cd terraform && terraform fmt -recursive"
            echo "   git add -u && git commit -m 'style: terraform fmt'"
            echo ""
          else
            echo "✅ Todos los ficheros .tf ya estaban correctamente formateados."
          fi

      # ── Init (sin backend real, solo sintaxis) ─────────
      - name: Terraform Init (backend=false)
        working-directory: terraform/
        run: |
          terraform init -backend=false
          echo "✅ Init completado (sin backend remoto)"

      # ── Validate ───────────────────────────────
      - name: Terraform validate
        working-directory: terraform/
        run: |
          terraform validate
          echo "✅ Terraform válido"

      # ── Comprobar docker-compose ────────────────────
      - name: Validate docker-compose files
        run: |
          if command -v docker &> /dev/null; then
            for f in docker-compose*.yml; do
              docker compose -f "$f" config --quiet \
                && echo "✅ $f válido" \
                || echo "⚠️  $f tiene errores de sintaxis"
            done
          else
            echo "ℹ️  Docker no disponible en el runner, saltando validación compose"
          fi

      - name: Infra check complete
        run: echo "✅ Infra CI completado correctamente"
