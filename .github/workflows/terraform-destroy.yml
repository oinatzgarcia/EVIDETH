name: "🚨 Terraform DESTROY"

# =============================================================
# ADVERTENCIA: Este workflow DESTRUYE TODA la infraestructura
# de Azure de forma IRREVERSIBLE.
#
# Salvaguardas:
#   1. Solo se puede lanzar manualmente (workflow_dispatch)
#      Nunca se dispara en push, PR ni schedule.
#   2. Debes escribir exactamente "DESTROY" en el campo de
#      confirmación. Cualquier otro valor aborta el workflow.
# =============================================================

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '⚠️ Escribe DESTROY (en mayúsculas) para confirmar el borrado de TODA la infraestructura'
        required: true
        type: string
      reason:
        description: 'Motivo del destroy (se guarda en el log del workflow)'
        required: false
        type: string
        default: 'No especificado'

permissions:
  id-token: write
  contents: read

jobs:
  # -----------------------------------------------------------
  # SALVAGUARDA: verificar confirmación antes de hacer nada
  # -----------------------------------------------------------
  confirm:
    name: "✅ Verificar confirmación"
    runs-on: ubuntu-latest
    steps:
      - name: Comprobar palabra de confirmación
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DESTROY" ]; then
            echo ""
            echo "❌ ERROR: Confirmación incorrecta."
            echo "   Escribiste: '${{ github.event.inputs.confirmation }}'"
            echo "   Se esperaba: 'DESTROY' (exactamente, en mayúsculas)"
            echo ""
            echo "El destroy ha sido CANCELADO. Ningún recurso ha sido modificado."
            exit 1
          fi
          echo "✅ Confirmación correcta. Continuando con el destroy..."
          echo ""
          echo "📝 Motivo registrado: ${{ github.event.inputs.reason }}"
          echo "👤 Lanzado por: ${{ github.actor }}"
          echo "🕒 Timestamp: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"

  # -----------------------------------------------------------
  # DESTROY: solo se ejecuta si el job anterior tuvo éxito
  # -----------------------------------------------------------
  destroy:
    name: "🚨 Terraform Destroy"
    runs-on: ubuntu-latest
    needs: confirm          # depende de la salvaguarda
    environment: destroy    # entorno de GitHub con protección opcional (revisor)

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
      TF_VAR_environment: "dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init

      # Eliminar lock huérfano si lo hubiera (mismo patrón que terraform-apply.yml)
      - name: Force-unlock stale Terraform state lock
        run: |
          ACCOUNT="evidethtfstate"
          CONTAINER="tfstate"
          LOCK_BLOB="evideth.terraform.tfstate.lock"

          STORAGE_KEY=$(az storage account keys list \
            --resource-group evideth-dev-rg \
            --account-name "$ACCOUNT" \
            --query "[0].value" \
            --output tsv 2>/dev/null) || true

          if [ -n "$STORAGE_KEY" ]; then
            az storage blob delete \
              --account-name "$ACCOUNT" \
              --account-key  "$STORAGE_KEY" \
              --container-name "$CONTAINER" \
              --name "$LOCK_BLOB" 2>/dev/null \
              && echo "🔓 Stale lock removed" || echo "✅ No stale lock found"
          fi

      - name: Terraform Plan Destroy (preview)
        working-directory: terraform/
        run: |
          echo ""
          echo "⚠️  PLAN DE DESTRUCCIÓN — recursos que serán eliminados:"
          echo ""
          terraform plan -destroy -no-color -out=tfdestroyplan

      - name: Terraform Destroy
        working-directory: terraform/
        run: |
          echo ""
          echo "🚨 Ejecutando terraform destroy..."
          echo "👤 Operador: ${{ github.actor }}"
          echo "📝 Motivo:   ${{ github.event.inputs.reason }}"
          echo ""
          terraform apply -destroy -auto-approve tfdestroyplan
          echo ""
          echo "✅ Destroy completado. Todos los recursos de Azure han sido eliminados."
          echo ""
          echo "⚠️  RECORDATORIO: El Storage Account del estado de Terraform (evidethtfstate)"
          echo "    NO es gestionado por Terraform y NO ha sido eliminado."
          echo "    Esto es intencionado: conserva el estado para futuros re-despliegues."
          echo "    Para eliminarlo manualmente: az storage account delete --name evidethtfstate --resource-group evideth-dev-rg"
