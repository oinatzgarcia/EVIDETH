# ─────────────────────────────────────────────────────────────
# EVIDETH — infra.yml
# Workflow REUTILIZABLE — llamado desde ci.yml
# Valida infraestructura: terraform fmt, validate.
# NO hace plan ni apply (eso lo hacen terraform-plan.yml
# y terraform-apply.yml existentes).
# ─────────────────────────────────────────────────────────────
name: Infra CI

on:
  workflow_call:   # Solo se ejecuta cuando lo llama ci.yml

jobs:
  infra:
    name: Infra — Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      # ── Formato ────────────────────────────────────
      # Usamos || true para que un formato incorrecto no rompa el CI.
      # El paso reporta los archivos mal formateados pero no bloquea.
      - name: Terraform fmt check
        working-directory: terraform/
        run: |
          if terraform fmt -check -recursive; then
            echo "\u2705 Formato Terraform correcto"
          else
            echo "\u26a0\ufe0f  Hay archivos Terraform mal formateados (ejecuta 'terraform fmt -recursive' localmente)"
          fi

      # ── Init (sin backend real, solo sintaxis) ─────────
      - name: Terraform Init (backend=false)
        working-directory: terraform/
        run: |
          terraform init -backend=false
          echo "\u2705 Init completado (sin backend remoto)"

      # ── Validate ──────────────────────────────────
      - name: Terraform validate
        working-directory: terraform/
        run: |
          terraform validate
          echo "\u2705 Terraform v\u00e1lido"

      # ── Comprobar docker-compose ────────────────────
      - name: Validate docker-compose files
        run: |
          if command -v docker &> /dev/null; then
            for f in docker-compose*.yml; do
              docker compose -f "$f" config --quiet \
                && echo "\u2705 $f v\u00e1lido" \
                || echo "\u26a0\ufe0f  $f tiene errores de sintaxis"
            done
          else
            echo "\u2139\ufe0f  Docker no disponible en el runner, saltando validaci\u00f3n compose"
          fi

      - name: Infra check complete
        run: echo "\u2705 Infra CI completado correctamente"
