# ─────────────────────────────────────────────────────────────
# EVIDETH — docker-compose.client.yml
# Despliega el cliente web (Live Camera Viewer) con grabación de vídeo.
#
# Uso:
#   1. Edita frontend/client.config.js con tu CAMERA_ID, API_KEY y BACKEND_URL
#   2. docker compose -f docker-compose.client.yml up --build
#   3. Abre http://localhost:8080/pages/viewer/viewer.html
#
# El navegador graba el canvas en WebM (MediaRecorder).
# El servidor Python transcodifica WebM → MP4 (H.264) con ffmpeg.
# Los segmentos MP4 se guardan en ./VIDEOS/<CAMERA_ID>/<VIDEO_ID>/seg_NNN.mp4
# ─────────────────────────────────────────────────────────────
name: evideth-client

services:
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: evideth-client
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./VIDEOS:/videos
    restart: unless-stopped
    environment:
      - VIDEOS_ROOT=/videos
