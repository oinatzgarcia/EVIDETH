# ─────────────────────────────────────────────────────────────
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - 'alembic/**'
      - 'alembic.ini'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME:         evidethdevacr94f04b
  IMAGE_NAME:       evideth-backend
  CONTAINER_APP:    evideth-dev-backend
  RESOURCE_GROUP:   evideth-dev-rg

jobs:
  # ── Job 1: Build & Push ────────────────────────────────────────────
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHA}" >> $GITHUB_OUTPUT

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push (SHA tag + latest)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Job 2: Deploy Container App ─────────────────────────────────────
  # El deploy NO espera migraciones: la app arranca sola con create_all.
  # Las migraciones se lanzan en paralelo y si fallan no bloquean la app.
  deploy:
    name: Update Container App
    runs-on: ubuntu-latest
    needs: build-push

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App revision
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image_tag }}"
          echo "Deploying: $IMAGE"
          az containerapp update \
            --name            ${{ env.CONTAINER_APP }} \
            --resource-group  ${{ env.RESOURCE_GROUP }} \
            --image           "$IMAGE"

      - name: Wait for revision to be active
        run: sleep 40

      - name: Health check
        run: |
          URL=$(az containerapp show \
            --name           ${{ env.CONTAINER_APP }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query          "properties.configuration.ingress.fqdn" \
            --output         tsv)
          echo "Health check: https://${URL}/api/v1/health"
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "https://${URL}/api/v1/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend healthy at https://${URL}"
              echo "Swagger: https://${URL}/docs"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 5 attempts"
          exit 1

  # ── Job 3: Migrate (en paralelo, no bloquea el deploy) ──────────────
  # Si falla, el workflow queda en warning pero la app sigue activa.
  migrate:
    name: DB Migrate (best-effort)
    needs: deploy          # espera a que la app esté corriendo
    uses: ./.github/workflows/migrate.yml
    permissions:
      id-token: write
      contents: read
    # continue-on-error a nivel de job reutilizable no es posible,
    # pero al estar desacoplado del deploy no bloquea el acceso a la app.
