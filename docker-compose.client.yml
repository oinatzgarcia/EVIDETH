# ─────────────────────────────────────────────────────────────
# EVIDETH — docker-compose.client.yml
# Despliega SOLO el cliente web (Live Camera Viewer).
#
# Uso:
#   1. Edita frontend/client.config.js con tu CAMERA_ID, API_KEY y BACKEND_URL
#   2. docker compose -f docker-compose.client.yml up
#   3. Abre http://localhost:8080
# ─────────────────────────────────────────────────────────────
name: evideth-client

services:
  client:
    image: nginx:alpine
    container_name: evideth-client
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx-client.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
