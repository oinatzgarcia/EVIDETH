# ─────────────────────────────────────────────────────────────
# EVIDETH — terraform-apply.yml
# 1. Llama a build-push para asegurar que la imagen existe en ACR
# 2. Ejecuta terraform apply
# Usa OIDC (Workload Identity Federation) — sin secretos.
# ─────────────────────────────────────────────────────────────
name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  # ── Job 1: build y push de la imagen al ACR ──────────────────
  build-push:
    name: Build & Push Backend Image
    uses: ./.github/workflows/build-push.yml
    permissions:
      id-token: write
      contents: read

  # ── Job 2: Terraform apply (espera a que la imagen exista) ───
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-push          # <-- depende del job anterior

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
      TF_VAR_environment: "dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform/
        run: terraform validate

      # Plan y Apply en un solo paso para evitar que un tfplan
      # generado con region incorrecta sea reutilizado.
      - name: Terraform Plan & Apply
        working-directory: terraform/
        run: |
          terraform plan -no-color -out=tfplan
          terraform apply -auto-approve tfplan
