# nginx-client.conf — configuración completa para Alpine
# Reemplaza /etc/nginx/nginx.conf dentro del contenedor Docker

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 80;
        root /usr/share/nginx/html;
        index pages/viewer/viewer.html;

        # Proxy al servidor Python de guardado de vídeo
        location /save-segment {
            proxy_pass         http://127.0.0.1:5000/save-segment;
            proxy_http_version 1.1;
            client_max_body_size 500M;
            proxy_read_timeout   120s;
            proxy_send_timeout   120s;
        }

        # Health check del servidor Python
        location /health {
            proxy_pass http://127.0.0.1:5000/health;
        }

        # Servir ficheros estáticos normalmente
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
