# EVIDETH — CI: Tests Unitarios Automáticos
# ============================================
# Se ejecuta en cada push y pull request sobre main y develop.
# Tests unitarios SOLO — no requieren BD, red ni Azure.
#
# Ver resultados en: Actions > unit-tests

name: Unit Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'app/**'
      - 'tests/unit/**'
      - 'requirements.txt'
      - '.github/workflows/unit-tests.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  unit-tests:
    name: Run Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run unit tests with coverage
        env:
          # Variables mínimas para que los imports de app/ no fallen
          # (los tests unitarios no usan BD real)
          DATABASE_URL: postgresql://fake:fake@localhost/fake
          SECRET_KEY: ci-test-secret-key-not-real
          AZURE_KEY_VAULT_URL: https://fake.vault.azure.net/
          ENVIRONMENT: test
        run: |
          pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -p no:warnings

      - name: 📊 Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14
