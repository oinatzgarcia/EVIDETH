# ─────────────────────────────────────────────────────────────
# EVIDETH — ci.yml
# Orquestador principal de CI.
# Se dispara en push y PR a main/develop.
# Detecta qué ha cambiado con dorny/paths-filter y llama
# solo los workflows reutilizables necesarios:
#   • frontend.yml  → templates / static
#   • backend.yml   → app / tests / alembic / requirements / Dockerfile
#   • infra.yml     → terraform / docker-compose
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:    # permite lanzarlo manualmente desde la UI

permissions:
  contents: read
  pull-requests: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Detectar qué partes del repo han cambiado
  # ─────────────────────────────────────────────────────────────
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend:  ${{ steps.filter.outputs.backend }}
      infra:    ${{ steps.filter.outputs.infra }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - 'app/templates/**'
              - 'app/static/**'
              - '.github/workflows/frontend.yml'
            backend:
              - 'app/**'
              - 'tests/**'
              - 'alembic/**'
              - 'alembic.ini'
              - 'requirements.txt'
              - 'Dockerfile'
              - '.github/workflows/backend.yml'
            infra:
              - 'terraform/**'
              - 'docker-compose*.yml'
              - '.github/workflows/infra.yml'
              - '.github/workflows/terraform-*.yml'

  # ─────────────────────────────────────────────────────────────
  # 2. Llamar workflows reutilizables según lo que cambió
  # ─────────────────────────────────────────────────────────────
  frontend:
    name: Frontend CI
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/frontend.yml
    secrets: inherit

  backend:
    name: Backend CI
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/backend.yml
    secrets: inherit

  infra:
    name: Infra CI
    needs: changes
    if: needs.changes.outputs.infra == 'true'
    uses: ./.github/workflows/infra.yml
    secrets: inherit

  # ─────────────────────────────────────────────────────────────
  # 3. Job final — único check obligatorio para branch protection
  # ─────────────────────────────────────────────────────────────
  ci-success:
    name: CI ✔ All checks passed
    runs-on: ubuntu-latest
    needs: [changes, frontend, backend, infra]
    # Se ejecuta siempre, incluso si los jobs anteriores se saltaron
    if: always()
    steps:
      - name: Evaluate results
        run: |
          FRONTEND="${{ needs.frontend.result }}"
          BACKEND="${{ needs.backend.result }}"
          INFRA="${{ needs.infra.result }}"

          echo "Frontend : $FRONTEND"
          echo "Backend  : $BACKEND"
          echo "Infra    : $INFRA"

          for result in "$FRONTEND" "$BACKEND" "$INFRA"; do
            if [[ "$result" == "failure" || "$result" == "cancelled" ]]; then
              echo "❌ Uno o más jobs han fallado"
              exit 1
            fi
          done

          echo "✅ CI completado correctamente (jobs saltados = sin cambios en esa área)"
