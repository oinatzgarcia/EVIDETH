name: Terraform Apply

on:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-*.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build-push:
    name: Build & Push Backend Image
    uses: ./.github/workflows/build-push.yml
    permissions:
      id-token: write
      contents: read

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-push

    env:
      ARM_USE_OIDC: "true"
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_subscription_id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      TF_VAR_jwt_secret_key: ${{ secrets.JWT_SECRET_KEY }}
      TF_VAR_environment: "dev"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: terraform/
        run: terraform init

      # ── Force-unlock stale lock (idempotente) ────────────────────────
      # Si un apply anterior falló a mitad, el blob de lock queda huérfano.
      - name: Force-unlock stale Terraform state lock
        run: |
          ACCOUNT="evidethtfstate"
          CONTAINER="tfstate"
          LOCK_BLOB="evideth.terraform.tfstate.lock"

          STORAGE_KEY=$(az storage account keys list \
            --resource-group evideth-dev-rg \
            --account-name "$ACCOUNT" \
            --query "[0].value" \
            --output tsv)

          az storage blob delete \
            --account-name "$ACCOUNT" \
            --account-key  "$STORAGE_KEY" \
            --container-name "$CONTAINER" \
            --name "$LOCK_BLOB" 2>/dev/null \
            && echo "🔓 Stale lock removed" || echo "✅ No stale lock found"

      - name: Terraform Validate
        working-directory: terraform/
        run: terraform validate

      - name: Terraform Plan & Apply
        working-directory: terraform/
        run: |
          terraform plan -no-color -out=tfplan
          terraform apply -auto-approve tfplan
