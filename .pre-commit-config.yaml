# =============================================================
# EVIDETH — Pre-commit hooks
# Se ejecutan automáticamente ANTES de cada `git commit`
#
# Instalación (una sola vez):
#   pip install pre-commit
#   pre-commit install
#
# Ejecución manual sobre todos los ficheros:
#   pre-commit run --all-files
# =============================================================

repos:

  # -----------------------------------------------------------
  # 1. HOOKS BÁSICOS DE CALIDAD
  # -----------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace        # Elimina espacios al final de línea
      - id: end-of-file-fixer          # Asegura salto de línea al final
      - id: check-yaml                 # Valida sintaxis de ficheros YAML
      - id: check-json                 # Valida sintaxis de ficheros JSON
      - id: check-merge-conflict       # Detecta marcadores de merge sin resolver
      - id: check-added-large-files    # Bloquea ficheros > 500KB
        args: ['--maxkb=500']
      - id: detect-private-key         # Detecta claves privadas PEM/RSA hardcodeadas

  # -----------------------------------------------------------
  # 2. SECRET SCAN — Gitleaks
  #    Detecta credenciales, tokens, API keys y secretos
  #    antes de que lleguen al repositorio
  # -----------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks
        name: "\U0001F50D Secret Scan (Gitleaks)"
        description: "Escanea el diff del commit en busca de secretos y credenciales"

  # -----------------------------------------------------------
  # 3. FORMATO DE CÓDIGO — Black + isort
  # -----------------------------------------------------------
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
      - id: black
        name: "\U0001F3A8 Formato Python (Black)"
        language_version: python3

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: "\U0001F4E6 Orden de imports (isort)"
        args: ["--profile", "black"]

  # -----------------------------------------------------------
  # 4. TESTS UNITARIOS — se ejecutan antes de cada commit
  #    Solo tests/unit/ para que el hook sea rápido (< 30s)
  #    Los tests de integración se ejecutan en CI/CD
  #
  #    IMPORTANTE: Se usa ./venv/bin/python explícitamente para
  #    que httpx==0.27.0 (pinned en requirements.txt) sea el que
  #    se use. httpx>=0.28 rompe starlette.testclient (elimina
  #    el argumento 'app=' en Client.__init__).
  #
  #    Las variables de entorno son dummies de CI (no secretos).
  # -----------------------------------------------------------
  - repo: local
    hooks:
      - id: unit-tests
        name: "\U0001F9EA Tests unitarios (pytest)"
        entry: >-
          env
          SECRET_KEY=pre-commit-dummy-not-a-real-secret
          DATABASE_URL=sqlite:///./test_precommit.db
          JWT_SECRET_KEY=pre-commit-dummy-not-a-real-secret
          USE_AZURE_KEY_VAULT=false
          ./venv/bin/python -m pytest tests/unit/ -v --tb=short -q
        language: system
        pass_filenames: false
        always_run: false
        types: [python]
        description: "Ejecuta tests unitarios antes del commit. Usa el venv del proyecto."
